<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D - 桌上自习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #2a2a2a; }
        html.deskpet-mode, html.deskpet-mode body { background: transparent; }
        html.deskpet-mode .content { display: none; }
        html.deskpet-mode #live2d-canvas {
            top: 0; left: 0;
            transform: none;
            width: 100%; height: 100%;
            pointer-events: auto;
            cursor: grab;
        }
        html.deskpet-mode #live2d-canvas:active { cursor: grabbing; }
        html.deskpet-mode #config-panel { top: 4px; right: 4px; }
        #live2d-canvas {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 9999;
        }
        .content {
            width: 100%; height: 100%; display: flex;
            align-items: center; justify-content: center;
            color: #fff; font-family: sans-serif; font-size: 2rem;
        }

        /* 配置面板 */
        #config-panel {
            position: fixed; top: 12px; right: 12px;
            width: 300px; max-height: calc(100vh - 24px);
            background: rgba(30, 30, 35, 0.92);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #ddd; font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px; z-index: 100000;
            overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #config-header {
            padding: 12px 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            user-select: none;
            position: relative;
        }
        #config-header:hover { background: rgba(255,255,255,0.04); }
        #config-header h3 { font-size: 14px; font-weight: 600; color: #fff; }
        #config-toggle { transition: transform 0.2s; font-size: 12px; }
        #config-panel.collapsed #config-toggle { transform: rotate(-90deg); }
        #config-panel.collapsed #config-body { display: none; }
        #config-panel.hidden { display: none !important; }
        #config-close {
            position: absolute; top: 8px; right: 10px;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 4px;
            font-size: 16px; color: rgba(255,255,255,0.5);
            line-height: 1;
        }
        #config-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
        #config-body { padding: 10px 14px 14px; overflow-y: auto; }

        .cfg-row { margin-bottom: 10px; }
        .cfg-row:last-child { margin-bottom: 0; }
        .cfg-label {
            display: flex; justify-content: space-between;
            margin-bottom: 4px; color: #bbb; font-size: 12px;
        }
        .cfg-label span:first-child { font-weight: 500; }
        .cfg-label .cfg-val { color: #6ec3ff; font-variant-numeric: tabular-nums; }
        input[type=range] {
            width: 100%; height: 4px; cursor: pointer;
            -webkit-appearance: none; appearance: none;
            background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: #6ec3ff; border-radius: 50%; border: 2px solid #1e1e23;
            box-shadow: 0 0 6px rgba(110,195,255,0.4);
        }
        input[type=range]::-moz-range-thumb {
            width: 14px; height: 14px; background: #6ec3ff;
            border-radius: 50%; border: 2px solid #1e1e23;
            box-shadow: 0 0 6px rgba(110,195,255,0.4);
        }
        .cfg-hint {
            font-size: 11px; color: #888; margin-top: 2px; line-height: 1.4;
        }
        .cfg-sep {
            height: 1px; background: rgba(255,255,255,0.08);
            margin: 10px 0;
        }
        .cfg-group-title {
            font-size: 11px; font-weight: 600; color: #fff;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .cfg-check {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .cfg-check input { width: 16px; height: 16px; accent-color: #6ec3ff; }
    </style>
</head>
<body>
    <canvas id="live2d-canvas" width="1280" height="1280"></canvas>
    <div class="content">
        <p>背景内容区域 —— Canvas 已设置 pointer-events: none，鼠标可穿透点击此处</p>
    </div>

    <!-- 配置面板 -->
    <div id="config-panel" class="hidden">
        <div id="config-header">
            <h3>⚙ 参数调节</h3>
            <span id="config-toggle">▼</span>
            <span id="config-close">×</span>
        </div>
        <div id="config-body">
            <div class="cfg-group-title">平移</div>
            <div class="cfg-row">
                <div class="cfg-label"><span>头部最大移动</span><span class="cfg-val" id="v-head">10</span></div>
                <input type="range" id="r-head" min="0" max="30" step="0.5" value="10">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>眼睛最大移动</span><span class="cfg-val" id="v-eye">5</span></div>
                <input type="range" id="r-eye" min="0" max="20" step="0.5" value="5">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>瞳孔额外移动</span><span class="cfg-val" id="v-pupil">3</span></div>
                <input type="range" id="r-pupil" min="0" max="10" step="0.5" value="3">
            </div>

            <div class="cfg-sep"></div>
            <div class="cfg-group-title">旋转</div>
            <div class="cfg-row">
                <div class="cfg-label"><span>抬头角度</span><span class="cfg-val" id="v-hup">25°</span></div>
                <input type="range" id="r-hup" min="0" max="35" step="0.5" value="25">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>低头角度</span><span class="cfg-val" id="v-hdn">8°</span></div>
                <input type="range" id="r-hdn" min="0" max="20" step="0.5" value="8">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>身体左右转动</span><span class="cfg-val" id="v-bang">4°</span></div>
                <input type="range" id="r-bang" min="0" max="10" step="0.5" value="4">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>腿部弯曲强度</span><span class="cfg-val" id="v-legb">25%</span></div>
                <input type="range" id="r-legb" min="0" max="100" step="5" value="25">
                <div class="cfg-hint">仿射变换倾斜+压缩模拟膝盖弯曲，0=无弯曲</div>
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>颈部跟随头部</span><span class="cfg-val" id="v-ninf">85%</span></div>
                <span style="display:flex;align-items:center;gap:4px;">
                    <input type="number" id="n-ninf" value="85" min="0" max="100" step="1"
                           style="width:44px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#6ec3ff;padding:2px 4px;font-size:12px;text-align:center;outline:none;">
                    <span class="cfg-val">%</span>
                </span>
                <input type="range" id="r-ninf" min="0" max="100" step="1" value="85">
            </div>

            <div class="cfg-sep"></div>
            <div class="cfg-group-title">手部</div>
            <div class="cfg-row">
                <div class="cfg-label"><span>手部摆动角度</span><span class="cfg-val" id="v-hwa">3°</span></div>
                <input type="range" id="r-hwa" min="0" max="10" step="0.5" value="3">
                <div class="cfg-hint">围绕肩膀连接处的旋转摆动幅度</div>
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>手部剪切强度</span><span class="cfg-val" id="v-hws">0.10</span></div>
                <input type="range" id="r-hws" min="0" max="0.5" step="0.01" value="0.10">
                <div class="cfg-hint">模拟手臂前后摆动的透视变形</div>
            </div>

            <div class="cfg-sep"></div>
            <div class="cfg-group-title">平滑</div>
            <div class="cfg-row">
                <div class="cfg-label"><span>头部/身体平滑</span><span class="cfg-val" id="v-lhead">0.08</span></div>
                <input type="range" id="r-lhead" min="0.01" max="0.30" step="0.01" value="0.08">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>眼睛平滑</span><span class="cfg-val" id="v-leye">0.12</span></div>
                <input type="range" id="r-leye" min="0.01" max="0.30" step="0.01" value="0.12">
            </div>

            <div class="cfg-sep"></div>
            <div class="cfg-group-title">限位</div>
            <div class="cfg-row">
                <div class="cfg-label"><span>瞳孔水平限位</span><span class="cfg-val" id="v-px">5</span></div>
                <input type="range" id="r-px" min="0" max="10" step="0.5" value="5">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>瞳孔垂直限位</span><span class="cfg-val" id="v-py">0</span></div>
                <input type="range" id="r-py" min="0" max="5" step="0.5" value="0">
                <div class="cfg-hint">建议保持 0，眼白与瞳孔几乎等高</div>
            </div>

            <div class="cfg-sep"></div>
            <label class="cfg-check">
                <input type="checkbox" id="c-debug">
                <span>显示调试框</span>
            </label>
        </div>
    </div>

    <script>
        // ========== 桌宠模式检测 ==========
        const IS_DESKPET = new URLSearchParams(location.search).get('mode') === 'deskpet';
        if (IS_DESKPET) {
            document.documentElement.classList.add('deskpet-mode');
        }

        const canvas = document.getElementById('live2d-canvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_SIZE = 1280;

        // 图层配置（绘制顺序：从后到前）
        const layerConfigs = [
            { name: 'chair',           filename: 'layers/chair.png',           group: 'prop' },
            { name: 'back_hair',       filename: 'layers/back_hair.png',       group: 'head' },
            { name: 'table_back',      filename: 'layers/table_back.png',      group: 'prop' },
            { name: 'legwear',         filename: 'layers/legwear.png',         group: 'leg' },
            { name: 'bottomwear',      filename: 'layers/bottomwear.png',      group: 'body' },
            { name: 'footwear',        filename: 'layers/footwear.png',        group: 'leg' },
            { name: 'table4_back',     filename: 'layers/table4_back.png',     group: 'prop' },
            { name: 'left_hand',       filename: 'layers/left_hand.png',       group: 'hand' },
            { name: 'topwear',         filename: 'layers/topwear.png',         group: 'body' },
            { name: 'neck',            filename: 'layers/neck.png',            group: 'neck' },
            { name: 'pen',             filename: 'layers/pen.png',             group: 'hand' },
            { name: 'left_hand_front', filename: 'layers/left_hand_front.png', group: 'hand' },
            { name: 'table4_front',    filename: 'layers/table4_front.png',    group: 'prop' },
            { name: 'right_hand',      filename: 'layers/right_hand.png',      group: 'hand' },
            { name: 'book',            filename: 'layers/book.png',            group: 'prop' },
            { name: 'ears',            filename: 'layers/ears.png',            group: 'head' },
            { name: 'face',            filename: 'layers/face.png',            group: 'head' },
            { name: 'eyewhite',        filename: 'layers/eyewhite.png',        group: 'eye' },
            { name: 'irides',          filename: 'layers/irides.png',          group: 'pupil' },
            { name: 'eyelash',         filename: 'layers/eyelash.png',         group: 'eye' },
            { name: 'eyebrow',         filename: 'layers/eyebrow.png',         group: 'eye' },
            { name: 'nose',            filename: 'layers/nose.png',            group: 'eye' },
            { name: 'mouth',           filename: 'layers/mouth.png',           group: 'eye' },
            { name: 'front_hair',      filename: 'layers/front_hair.png',      group: 'head' },
            { name: 'headwear',        filename: 'layers/headwear.png',        group: 'head' },
        ];

        const layerPositions = {
            chair:           { x: 482,  y: 499,  w: 469, h: 779 },
            table_back:      { x: 181,  y: 787,  w: 200, h: 447 },
            table4_back:     { x: 160,  y: 538,  w: 749, h: 742 },
            table4_front:    { x: 160,  y: 538,  w: 823, h: 742 },
            pen:             { x: 448,  y: 482,  w: 44,  h: 121 },
            book:            { x: 546,  y: 575,  w: 295, h: 120 },
            bottomwear:      { x: 511,  y: 728,  w: 338, h: 152 },
            legwear:         { x: 391,  y: 724,  w: 429, h: 456 },
            footwear:        { x: 291,  y: 1114, w: 362, h: 166 },
            topwear:         { x: 563,  y: 327,  w: 304, h: 470 },
            left_hand:       { x: 432,  y: 353,  w: 183, h: 247 },
            left_hand_front: { x: 445,  y: 538,  w: 56,  h: 57  },
            right_hand:      { x: 542,  y: 353,  w: 331, h: 260 },
            back_hair:       { x: 518,  y: 99,   w: 269, h: 279 },
            neck:            { x: 622,  y: 246,  w: 98,  h: 133 },
            ears:            { x: 565,  y: 238,  w: 156, h: 72  },
            face:            { x: 548,  y: 170,  w: 152, h: 177 },
            eyewhite:        { x: 570,  y: 266,  w: 97,  h: 29  },
            irides:          { x: 576,  y: 265,  w: 85,  h: 30  },
            eyelash:         { x: 559,  y: 259,  w: 119, h: 38  },
            eyebrow:         { x: 554,  y: 247,  w: 111, h: 16  },
            nose:            { x: 601,  y: 298,  w: 9,   h: 17  },
            mouth:           { x: 618,  y: 325,  w: 14,  h: 6   },
            front_hair:      { x: 527,  y: 127,  w: 186, h: 224 },
            headwear:        { x: 673,  y: 152,  w: 79,  h: 87  },
        };

        const FACE_CENTER_X = 624;
        const FACE_CENTER_Y = 258;

        // ========== 可调参数 ==========
        const params = {
            maxHeadMove: 10,
            maxEyeMove: 5,
            maxPupilMove: 3,
            maxHeadUpAngle: 25,
            maxHeadDownAngle: 8,
            maxBodyAngle: 4,
            legBendFactor: 0.25,
            neckHeadInfluence: 0.85,
            headPivotX: 640,
            headPivotY: 330,
            bodyPivotX: 680,
            bodyPivotY: 850,
            lerpHead: 0.08,
            lerpEye: 0.12,
            pupilLimitX: 5,
            pupilLimitY: 0,
            maxHandWiggleAngle: 3,
            maxHandWiggleSkew: 0.10,
            debug: false
        };

        const D2R = Math.PI / 180;

        // 绑定配置面板
        function bindParam(id, key, fmt = v => v, suffix = '') {
            const el = document.getElementById('r-' + id);
            const disp = document.getElementById('v-' + id);
            if (!el || !disp) return;
            el.addEventListener('input', () => {
                const v = parseFloat(el.value);
                params[key] = v;
                disp.textContent = fmt(v) + suffix;
            });
        }
        bindParam('head',  'maxHeadMove');
        bindParam('eye',   'maxEyeMove');
        bindParam('pupil', 'maxPupilMove');
        bindParam('hup',  'maxHeadUpAngle',  v => v, '°');
        bindParam('hdn',  'maxHeadDownAngle', v => v, '°');
        bindParam('bang',  'maxBodyAngle',  v => v, '°');
        bindParam('hwa',  'maxHandWiggleAngle', v => v, '°');
        const rHws = document.getElementById('r-hws');
        const vHws = document.getElementById('v-hws');
        rHws.addEventListener('input', () => {
            const v = parseFloat(rHws.value);
            params.maxHandWiggleSkew = v;
            vHws.textContent = v.toFixed(2);
        });
        // 腿部弯曲：滑块值 0~100，实际参数 0~1
        const rLegb = document.getElementById('r-legb');
        const vLegb = document.getElementById('v-legb');
        rLegb.addEventListener('input', () => {
            const v = parseInt(rLegb.value);
            params.legBendFactor = v / 100;
            vLegb.textContent = v + '%';
        });
        bindParam('lhead', 'lerpHead',      v => v.toFixed(2));
        bindParam('leye',  'lerpEye',       v => v.toFixed(2));
        bindParam('px',    'pupilLimitX');
        bindParam('py',    'pupilLimitY');

        // 颈部跟随：滑块 + 数字输入联动
        const rNinf = document.getElementById('r-ninf');
        const nNinf = document.getElementById('n-ninf');
        function setNeckInf(v) {
            v = Math.max(0, Math.min(100, Math.round(v)));
            params.neckHeadInfluence = v / 100;
            rNinf.value = v;
            nNinf.value = v;
        }
        rNinf.addEventListener('input', () => setNeckInf(parseInt(rNinf.value)));
        nNinf.addEventListener('input', () => setNeckInf(parseInt(nNinf.value) || 0));
        nNinf.addEventListener('blur', () => setNeckInf(parseInt(nNinf.value) || 0));

        document.getElementById('c-debug').addEventListener('change', e => {
            params.debug = e.target.checked;
        });

        const panel = document.getElementById('config-panel');
        document.getElementById('config-header').addEventListener('click', () => {
            panel.classList.toggle('collapsed');
        });
        document.getElementById('config-close').addEventListener('click', (e) => {
            e.stopPropagation();
            panel.classList.add('hidden');
            panel.style.setProperty('display', 'none', 'important');
        });

        // 暴露给 Python 调用的显式显示函数
        window.showConfigPanel = function() {
            var p = document.getElementById('config-panel');
            if (p) {
                p.classList.remove('hidden');
                p.style.setProperty('display', 'flex', 'important');
            }
        };

        // 状态
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        // 全局鼠标坐标（由 Python 通过 runJavaScript 传入，桌宠模式下生效）
        window.onGlobalMouseMove = function(x, y) {
            mouseX = x;
            mouseY = y;
        };

        let targetHeadX = 0, targetHeadY = 0;
        let currentHeadX = 0, currentHeadY = 0;
        let targetHeadAngle = 0, currentHeadAngle = 0;
        let targetBodyAngle = 0, currentBodyAngle = 0;
        let targetEyeX = 0, targetEyeY = 0;
        let currentEyeX = 0, currentEyeY = 0;
        let targetLeftHandAngle = 0, currentLeftHandAngle = 0;
        let targetRightHandAngle = 0, currentRightHandAngle = 0;
        let targetLeftHandSkew = 0, currentLeftHandSkew = 0;
        let targetRightHandSkew = 0, currentRightHandSkew = 0;

        let images = {};
        let loadedCount = 0;
        let allLoaded = false;

        function loadImages() {
            layerConfigs.forEach(cfg => {
                const img = new Image();
                img.src = cfg.filename;
                img.onload = () => { images[cfg.name] = img; loadedCount++; if (loadedCount === layerConfigs.length) allLoaded = true; };
                img.onerror = () => { console.error('Failed to load:', cfg.filename); loadedCount++; };
            });
        }

        // 非桌宠模式：用 document 鼠标事件；桌宠模式：由 Python 传入全局坐标
        if (!IS_DESKPET) {
            document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        }

        // ========== 桌宠拖动支持 ==========
        if (IS_DESKPET) {
            let isDragging = false;
            window.addEventListener('mousedown', e => {
                // 只有左键且不在配置面板上时才触发拖动
                if (e.button === 0 && !e.target.closest('#config-panel')) {
                    isDragging = true;
                    document.title = 'DP:DRAG_START';
                }
            });
            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    document.title = 'DP:DRAG_END';
                }
            });
            // 右键菜单
            window.addEventListener('contextmenu', e => {
                if (e.target.closest('#config-panel')) return;
                e.preventDefault();
                document.title = '';
                document.title = 'DP:CONTEXT_MENU';
            });
        }

        function lerp(a, b, t) { return a + (b - a) * t; }

        function getMouseOffset() {
            const rect = canvas.getBoundingClientRect();
            const scaleX = CANVAS_SIZE / rect.width;
            const scaleY = CANVAS_SIZE / rect.height;
            const cx = (mouseX - rect.left) * scaleX;
            const cy = (mouseY - rect.top) * scaleY;
            const dx = cx - FACE_CENTER_X;
            const dy = cy - FACE_CENTER_Y;
            const maxDist = CANVAS_SIZE * 0.6;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const factor = Math.min(dist, maxDist) / maxDist;
            const angle = Math.atan2(dy, dx);
            return { x: Math.cos(angle)*factor, y: Math.sin(angle)*factor };
        }

        function updateTargets() {
            const off = getMouseOffset();
            targetHeadX = off.x * params.maxHeadMove;
            targetHeadY = off.y * params.maxHeadMove;
            // 头部角度：只响应垂直方向（抬头/低头）
            // 鼠标在上(off.y<0) → 顺时针旋转(正角度)抬头；在下 → 逆时针(负角度)低头
            // 抬头(off.y<0)用 maxHeadUpAngle，低头(off.y>0)用 maxHeadDownAngle
            const headAngleLimit = off.y < 0 ? params.maxHeadUpAngle : params.maxHeadDownAngle;
            targetHeadAngle = -off.y * headAngleLimit * D2R;
            // 身体角度：只响应水平方向（左右转动）
            targetBodyAngle = off.x * params.maxBodyAngle * D2R;
            targetEyeX = off.x * params.maxEyeMove;
            targetEyeY = off.y * params.maxEyeMove;
            // 低头时(off.y>0)：左手向左展开(逆时针/负角度)，右手向右展开(顺时针/正角度)
            targetLeftHandAngle = -off.y * params.maxHandWiggleAngle * D2R;
            targetRightHandAngle = off.y * params.maxHandWiggleAngle * D2R;
            targetLeftHandSkew = -off.y * params.maxHandWiggleSkew;
            targetRightHandSkew = off.y * params.maxHandWiggleSkew;
        }

        function updateCurrent() {
            currentHeadX = lerp(currentHeadX, targetHeadX, params.lerpHead);
            currentHeadY = lerp(currentHeadY, targetHeadY, params.lerpHead);
            currentHeadAngle = lerp(currentHeadAngle, targetHeadAngle, params.lerpHead);
            currentBodyAngle = lerp(currentBodyAngle, targetBodyAngle, params.lerpHead);
            currentEyeX = lerp(currentEyeX, targetEyeX, params.lerpEye);
            currentEyeY = lerp(currentEyeY, targetEyeY, params.lerpEye);
            currentLeftHandAngle = lerp(currentLeftHandAngle, targetLeftHandAngle, params.lerpHead);
            currentRightHandAngle = lerp(currentRightHandAngle, targetRightHandAngle, params.lerpHead);
            currentLeftHandSkew = lerp(currentLeftHandSkew, targetLeftHandSkew, params.lerpHead);
            currentRightHandSkew = lerp(currentRightHandSkew, targetRightHandSkew, params.lerpHead);
        }

        // 计算某点围绕身体旋转中心旋转后的位移
        function getBodyRotDelta(px, py) {
            const dx = px - params.bodyPivotX;
            const dy = py - params.bodyPivotY;
            const c = Math.cos(currentBodyAngle);
            const s = Math.sin(currentBodyAngle);
            return {
                x: (dx * c - dy * s) - dx,
                y: (dx * s + dy * c) - dy
            };
        }

        // 将局部向量旋转到世界坐标系
        function rotateVector(vx, vy, angle) {
            const c = Math.cos(angle);
            const s = Math.sin(angle);
            return { x: vx * c - vy * s, y: vx * s + vy * c };
        }

        function getLayerTransform(group, name = '') {
            switch (group) {
                case 'prop':
                    return { pivotX: 0, pivotY: 0, angle: 0, offX: 0, offY: 0 };

                case 'body': {
                    return {
                        pivotX: params.bodyPivotX,
                        pivotY: params.bodyPivotY,
                        angle: currentBodyAngle,
                        offX: 0, offY: 0
                    };
                }

                case 'leg': {
                    const bend = params.legBendFactor;
                    const a = currentBodyAngle;
                    // 仿射变换模拟膝盖弯曲
                    // 身体左转(a<0)时：大腿根部基本固定，小腿向前/左偏移
                    // 通过强倾斜+压缩+位移组合来模拟
                    const skewX = -a * bend * 12.0;
                    const scaleY = 1 - Math.abs(a) * bend * 4.0;
                    const legOffX = a * bend * 250;
                    const legOffY = Math.abs(a) * bend * 120;
                    return {
                        pivotX: params.bodyPivotX,
                        pivotY: params.bodyPivotY,
                        angle: a,
                        skewX,
                        scaleY,
                        offX: legOffX,
                        offY: legOffY
                    };
                }

                case 'neck': {
                    const inf = params.neckHeadInfluence;
                    const neckAngle = currentBodyAngle + currentHeadAngle * inf;
                    const pivotDelta = getBodyRotDelta(params.headPivotX, params.headPivotY);
                    return {
                        pivotX: params.headPivotX + pivotDelta.x,
                        pivotY: params.headPivotY + pivotDelta.y,
                        angle: neckAngle,
                        offX: pivotDelta.x + currentHeadX * inf,
                        offY: pivotDelta.y + currentHeadY * inf
                    };
                }

                case 'head': {
                    const totalAngle = currentBodyAngle + currentHeadAngle;
                    const pivotDelta = getBodyRotDelta(params.headPivotX, params.headPivotY);
                    return {
                        pivotX: params.headPivotX + pivotDelta.x,
                        pivotY: params.headPivotY + pivotDelta.y,
                        angle: totalAngle,
                        offX: pivotDelta.x + currentHeadX,
                        offY: pivotDelta.y + currentHeadY
                    };
                }

                case 'eye': {
                    const totalAngle = currentBodyAngle + currentHeadAngle;
                    const pivotDelta = getBodyRotDelta(params.headPivotX, params.headPivotY);
                    const eyeWorld = rotateVector(currentEyeX, currentEyeY, totalAngle);
                    return {
                        pivotX: params.headPivotX + pivotDelta.x,
                        pivotY: params.headPivotY + pivotDelta.y,
                        angle: totalAngle,
                        offX: pivotDelta.x + currentHeadX + eyeWorld.x,
                        offY: pivotDelta.y + currentHeadY + eyeWorld.y
                    };
                }

                case 'pupil': {
                    const totalAngle = currentBodyAngle + currentHeadAngle;
                    const pivotDelta = getBodyRotDelta(params.headPivotX, params.headPivotY);

                    let extraX = (currentEyeX / (params.maxEyeMove || 1)) * params.maxPupilMove;
                    let extraY = (currentEyeY / (params.maxEyeMove || 1)) * params.maxPupilMove;
                    extraX = Math.max(-params.pupilLimitX, Math.min(params.pupilLimitX, extraX));
                    extraY = Math.max(-params.pupilLimitY, Math.min(params.pupilLimitY, extraY));

                    const pupilLocalX = currentEyeX + extraX;
                    const pupilLocalY = currentEyeY + extraY;
                    const pupilWorld = rotateVector(pupilLocalX, pupilLocalY, totalAngle);

                    return {
                        pivotX: params.headPivotX + pivotDelta.x,
                        pivotY: params.headPivotY + pivotDelta.y,
                        angle: totalAngle,
                        offX: pivotDelta.x + currentHeadX + pupilWorld.x,
                        offY: pivotDelta.y + currentHeadY + pupilWorld.y
                    };
                }

                case 'hand': {
                    // 左右手使用不同的连接处（肩膀位置）与不同的摆动方向
                    const isRight = name.includes('right');
                    const localPivotX = isRight ? 760 : 600;
                    const localPivotY = 380;
                    const localDX = localPivotX - params.bodyPivotX;
                    const localDY = localPivotY - params.bodyPivotY;
                    return {
                        pivotX: params.bodyPivotX,
                        pivotY: params.bodyPivotY,
                        angle: currentBodyAngle,
                        offX: 0,
                        offY: 0,
                        localDX,
                        localDY,
                        localPivotX,
                        localPivotY,
                        localAngle: isRight ? currentRightHandAngle : currentLeftHandAngle,
                        localSkewX: isRight ? currentRightHandSkew : currentLeftHandSkew
                    };
                }

                default:
                    return { pivotX: 0, pivotY: 0, angle: 0, offX: 0, offY: 0 };
            }
        }

        const GLOBAL_SCALE = IS_DESKPET ? 0.78 : 1.0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!allLoaded) return;

            ctx.save();
            ctx.translate(CANVAS_SIZE / 2, CANVAS_SIZE / 2);
            ctx.scale(GLOBAL_SCALE, GLOBAL_SCALE);
            ctx.translate(-CANVAS_SIZE / 2, -CANVAS_SIZE / 2);

            for (const cfg of layerConfigs) {
                const img = images[cfg.name];
                const pos = layerPositions[cfg.name];
                const t = getLayerTransform(cfg.group, cfg.name);
                if (!img || !pos) continue;

                ctx.save();
                if (cfg.group === 'hand') {
                    // hand 组：先身体变换，再围绕连接处局部变换
                    ctx.translate(t.pivotX + t.offX, t.pivotY + t.offY);
                    ctx.rotate(t.angle);
                    ctx.translate(t.localDX, t.localDY);
                    ctx.rotate(t.localAngle);
                    if (t.localSkewX !== 0) {
                        ctx.transform(1, 0, t.localSkewX, 1, 0, 0);
                    }
                    ctx.drawImage(img, pos.x - t.localPivotX, pos.y - t.localPivotY, pos.w, pos.h);
                } else {
                    ctx.translate(t.pivotX + t.offX, t.pivotY + t.offY);
                    ctx.rotate(t.angle);
                    // 腿部仿射变换：倾斜 + 压缩
                    if (t.skewX !== undefined) {
                        ctx.transform(1, 0, t.skewX, t.scaleY, 0, 0);
                    }
                    ctx.drawImage(img, pos.x - t.pivotX, pos.y - t.pivotY, pos.w, pos.h);
                }
                ctx.restore();
            }

            if (params.debug) {
                const eyeT = getLayerTransform('eye');
                const pupilT = getLayerTransform('pupil');
                const ew = layerPositions.eyewhite;
                const ir = layerPositions.irides;

                ctx.fillStyle = '#0ff';
                ctx.beginPath();
                ctx.arc(params.bodyPivotX, params.bodyPivotY, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = '11px sans-serif';
                ctx.fillText('bodyPivot', params.bodyPivotX + 8, params.bodyPivotY + 4);

                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(eyeT.pivotX, eyeT.pivotY, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.fillText('headPivot', eyeT.pivotX + 8, eyeT.pivotY + 4);

                ctx.save();
                ctx.translate(eyeT.pivotX + eyeT.offX, eyeT.pivotY + eyeT.offY);
                ctx.rotate(eyeT.angle);
                ctx.strokeStyle = '#0f0';
                ctx.lineWidth = 2;
                ctx.strokeRect(ew.x - eyeT.pivotX, ew.y - eyeT.pivotY, ew.w, ew.h);
                ctx.restore();

                ctx.save();
                ctx.translate(pupilT.pivotX + pupilT.offX, pupilT.pivotY + pupilT.offY);
                ctx.rotate(pupilT.angle);
                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 2;
                ctx.strokeRect(ir.x - pupilT.pivotX, ir.y - pupilT.pivotY, ir.w, ir.h);
                ctx.restore();
            }

            ctx.restore();
        }

        function animate() {
            updateTargets();
            updateCurrent();
            draw();
            requestAnimationFrame(animate);
        }

        function resizeCanvas() {
            canvas.width = CANVAS_SIZE;
            canvas.height = CANVAS_SIZE;
            if (IS_DESKPET) {
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
            } else {
                const size = Math.min(window.innerWidth, window.innerHeight);
                canvas.style.width = size + 'px';
                canvas.style.height = size + 'px';
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        loadImages();
        animate();
    </script>
</body>
</html>
