<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D - 桌上自习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #2a2a2a; }
        #live2d-canvas {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 9999;
        }
        .content {
            width: 100%; height: 100%; display: flex;
            align-items: center; justify-content: center;
            color: #fff; font-family: sans-serif; font-size: 2rem;
        }

        /* 配置面板 */
        #config-panel {
            position: fixed; top: 12px; right: 12px;
            width: 300px; max-height: calc(100vh - 24px);
            background: rgba(30, 30, 35, 0.92);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #ddd; font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px; z-index: 100000;
            overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #config-header {
            padding: 12px 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            user-select: none;
        }
        #config-header:hover { background: rgba(255,255,255,0.04); }
        #config-header h3 { font-size: 14px; font-weight: 600; color: #fff; }
        #config-toggle { transition: transform 0.2s; font-size: 12px; }
        #config-panel.collapsed #config-toggle { transform: rotate(-90deg); }
        #config-panel.collapsed #config-body { display: none; }
        #config-body { padding: 10px 14px 14px; overflow-y: auto; }

        .cfg-row { margin-bottom: 10px; }
        .cfg-row:last-child { margin-bottom: 0; }
        .cfg-label {
            display: flex; justify-content: space-between;
            margin-bottom: 4px; color: #bbb; font-size: 12px;
        }
        .cfg-label span:first-child { font-weight: 500; }
        .cfg-label .cfg-val { color: #6ec3ff; font-variant-numeric: tabular-nums; }
        input[type=range] {
            width: 100%; height: 4px; cursor: pointer;
            -webkit-appearance: none; appearance: none;
            background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: #6ec3ff; border-radius: 50%; border: 2px solid #1e1e23;
            box-shadow: 0 0 6px rgba(110,195,255,0.4);
        }
        input[type=range]::-moz-range-thumb {
            width: 14px; height: 14px; background: #6ec3ff;
            border-radius: 50%; border: 2px solid #1e1e23;
            box-shadow: 0 0 6px rgba(110,195,255,0.4);
        }
        .cfg-hint {
            font-size: 11px; color: #888; margin-top: 2px; line-height: 1.4;
        }
        .cfg-sep {
            height: 1px; background: rgba(255,255,255,0.08);
            margin: 10px 0;
        }
        .cfg-group-title {
            font-size: 11px; font-weight: 600; color: #fff;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .cfg-check {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .cfg-check input { width: 16px; height: 16px; accent-color: #6ec3ff; }
    </style>
</head>
<body>
    <canvas id="live2d-canvas" width="1280" height="1280"></canvas>
    <div class="content">
        <p>背景内容区域 —— Canvas 已设置 pointer-events: none，鼠标可穿透点击此处</p>
    </div>

    <!-- 配置面板 -->
    <div id="config-panel">
        <div id="config-header">
            <h3>⚙ 参数调节</h3>
            <span id="config-toggle">▼</span>
        </div>
        <div id="config-body">
            <div class="cfg-group-title">平移</div>
            <div class="cfg-row">
                <div class="cfg-label"><span>头部最大移动</span><span class="cfg-val" id="v-head">10</span></div>
                <input type="range" id="r-head" min="0" max="30" step="0.5" value="10">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>眼睛最大移动</span><span class="cfg-val" id="v-eye">5</span></div>
                <input type="range" id="r-eye" min="0" max="20" step="0.5" value="5">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>瞳孔额外移动</span><span class="cfg-val" id="v-pupil">3</span></div>
                <input type="range" id="r-pupil" min="0" max="10" step="0.5" value="3">
            </div>

            <div class="cfg-sep"></div>
            <div class="cfg-group-title">旋转</div>
            <div class="cfg-row">
                <div class="cfg-label"><span>头部最大旋转</span><span class="cfg-val" id="v-hang">6°</span></div>
                <input type="range" id="r-hang" min="0" max="15" step="0.5" value="6">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>身体最大旋转</span><span class="cfg-val" id="v-bang">2°</span></div>
                <input type="range" id="r-bang" min="0" max="10" step="0.5" value="2">
            </div>
            <div class="cfg-row">
                <div class="cfg-label">
                    <span>颈部跟随头部</span>
                    <span style="display:flex;align-items:center;gap:4px;">
                        <input type="number" id="n-ninf" value="35" min="0" max="60" step="1"
                               style="width:44px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#6ec3ff;padding:2px 4px;font-size:12px;text-align:center;outline:none;">
                        <span class="cfg-val" id="v-ninf">%</span>
                    </span>
                </div>
                <input type="range" id="r-ninf" min="0" max="60" step="1" value="35">
                <div class="cfg-hint">颈部受头部运动影响的比例，0=完全固定，60=完全跟随</div>
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>头部旋转中心 X</span><span class="cfg-val" id="v-hpx">640</span></div>
                <input type="range" id="r-hpx" min="500" max="800" step="5" value="640">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>头部旋转中心 Y</span><span class="cfg-val" id="v-hpy">330</span></div>
                <input type="range" id="r-hpy" min="200" max="500" step="5" value="330">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>身体旋转中心 X</span><span class="cfg-val" id="v-bpx">680</span></div>
                <input type="range" id="r-bpx" min="500" max="900" step="5" value="680">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>身体旋转中心 Y</span><span class="cfg-val" id="v-bpy">850</span></div>
                <input type="range" id="r-bpy" min="600" max="1100" step="5" value="850">
            </div>

            <div class="cfg-sep"></div>
            <div class="cfg-group-title">平滑</div>
            <div class="cfg-row">
                <div class="cfg-label"><span>头部/身体平滑</span><span class="cfg-val" id="v-lhead">0.08</span></div>
                <input type="range" id="r-lhead" min="0.01" max="0.30" step="0.01" value="0.08">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>眼睛平滑</span><span class="cfg-val" id="v-leye">0.12</span></div>
                <input type="range" id="r-leye" min="0.01" max="0.30" step="0.01" value="0.12">
            </div>

            <div class="cfg-sep"></div>
            <div class="cfg-group-title">限位</div>
            <div class="cfg-row">
                <div class="cfg-label"><span>瞳孔水平限位</span><span class="cfg-val" id="v-px">5</span></div>
                <input type="range" id="r-px" min="0" max="10" step="0.5" value="5">
            </div>
            <div class="cfg-row">
                <div class="cfg-label"><span>瞳孔垂直限位</span><span class="cfg-val" id="v-py">0</span></div>
                <input type="range" id="r-py" min="0" max="5" step="0.5" value="0">
                <div class="cfg-hint">建议保持 0，眼白与瞳孔几乎等高</div>
            </div>

            <div class="cfg-sep"></div>
            <label class="cfg-check">
                <input type="checkbox" id="c-debug">
                <span>显示调试框</span>
            </label>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('live2d-canvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_SIZE = 1280;

        // 图层配置（绘制顺序：从后到前）
        const layerConfigs = [
            { name: 'back_hair',   filename: 'layers/back_hair.png',   group: 'head' },
            { name: 'bottomwear',  filename: 'layers/bottomwear.png',  group: 'body' },
            { name: 'legwear',     filename: 'layers/legwear.png',     group: 'body' },
            { name: 'footwear',    filename: 'layers/footwear.png',    group: 'body' },
            { name: 'topwear',     filename: 'layers/topwear.png',     group: 'body' },
            { name: 'neck',        filename: 'layers/neck.png',        group: 'neck' },
            { name: 'objects',     filename: 'layers/objects.png',     group: 'prop' },
            { name: 'handwear',    filename: 'layers/handwear.png',    group: 'body' },
            { name: 'ears',        filename: 'layers/ears.png',        group: 'head' },
            { name: 'face',        filename: 'layers/face.png',        group: 'head' },
            { name: 'eyewhite',    filename: 'layers/eyewhite.png',    group: 'eye' },
            { name: 'irides',      filename: 'layers/irides.png',      group: 'pupil' },
            { name: 'eyelash',     filename: 'layers/eyelash.png',     group: 'eye' },
            { name: 'eyebrow',     filename: 'layers/eyebrow.png',     group: 'eye' },
            { name: 'nose',        filename: 'layers/nose.png',        group: 'eye' },
            { name: 'mouth',       filename: 'layers/mouth.png',       group: 'eye' },
            { name: 'front_hair',  filename: 'layers/front_hair.png',  group: 'head' },
            { name: 'headwear',    filename: 'layers/headwear.png',    group: 'head' },
        ];

        const layerPositions = {
            objects:     { x: 160,  y: 470,  w: 960, h: 810 },
            bottomwear:  { x: 511,  y: 728,  w: 338, h: 152 },
            legwear:     { x: 391,  y: 724,  w: 429, h: 456 },
            footwear:    { x: 291,  y: 1114, w: 362, h: 166 },
            topwear:     { x: 563,  y: 327,  w: 304, h: 470 },
            handwear:    { x: 432,  y: 353,  w: 441, h: 260 },
            back_hair:   { x: 518,  y: 99,   w: 269, h: 279 },
            neck:        { x: 622,  y: 246,  w: 98,  h: 133 },
            ears:        { x: 565,  y: 238,  w: 156, h: 72  },
            face:        { x: 548,  y: 170,  w: 152, h: 177 },
            eyewhite:    { x: 570,  y: 266,  w: 97,  h: 29  },
            irides:      { x: 576,  y: 265,  w: 85,  h: 30  },
            eyelash:     { x: 559,  y: 259,  w: 119, h: 38  },
            eyebrow:     { x: 554,  y: 247,  w: 111, h: 16  },
            nose:        { x: 601,  y: 298,  w: 9,   h: 17  },
            mouth:       { x: 618,  y: 325,  w: 14,  h: 6   },
            front_hair:  { x: 527,  y: 127,  w: 186, h: 224 },
            headwear:    { x: 673,  y: 152,  w: 79,  h: 87  },
        };

        const FACE_CENTER_X = 624;
        const FACE_CENTER_Y = 258;

        // ========== 可调参数 ==========
        const params = {
            maxHeadMove: 10,
            maxEyeMove: 5,
            maxPupilMove: 3,
            maxHeadAngle: 6,
            maxBodyAngle: 2,
            neckHeadInfluence: 0.35,
            headPivotX: 640,
            headPivotY: 330,
            bodyPivotX: 680,
            bodyPivotY: 850,
            lerpHead: 0.08,
            lerpEye: 0.12,
            pupilLimitX: 5,
            pupilLimitY: 0,
            debug: false
        };

        const D2R = Math.PI / 180;

        // 绑定配置面板
        function bindParam(id, key, fmt = v => v, suffix = '') {
            const el = document.getElementById('r-' + id);
            const disp = document.getElementById('v-' + id);
            el.addEventListener('input', () => {
                const v = parseFloat(el.value);
                params[key] = v;
                disp.textContent = fmt(v) + suffix;
            });
        }
        bindParam('head',  'maxHeadMove');
        bindParam('eye',   'maxEyeMove');
        bindParam('pupil', 'maxPupilMove');
        bindParam('hang',  'maxHeadAngle',  v => v, '°');
        bindParam('bang',  'maxBodyAngle',  v => v, '°');
        // 颈部跟随：滑块 + 数字输入联动
        const rNinf = document.getElementById('r-ninf');
        const nNinf = document.getElementById('n-ninf');
        function setNeckInf(v) {
            v = Math.max(0, Math.min(60, Math.round(v)));
            params.neckHeadInfluence = v / 100;
            rNinf.value = v;
            nNinf.value = v;
        }
        rNinf.addEventListener('input', () => setNeckInf(parseInt(rNinf.value)));
        nNinf.addEventListener('input', () => setNeckInf(parseInt(nNinf.value) || 0));
        nNinf.addEventListener('blur', () => setNeckInf(parseInt(nNinf.value) || 0));
        bindParam('hpx',   'headPivotX');
        bindParam('hpy',   'headPivotY');
        bindParam('bpx',   'bodyPivotX');
        bindParam('bpy',   'bodyPivotY');
        bindParam('lhead', 'lerpHead',      v => v.toFixed(2));
        bindParam('leye',  'lerpEye',       v => v.toFixed(2));
        bindParam('px',    'pupilLimitX');
        bindParam('py',    'pupilLimitY');

        document.getElementById('c-debug').addEventListener('change', e => {
            params.debug = e.target.checked;
        });

        const panel = document.getElementById('config-panel');
        document.getElementById('config-header').addEventListener('click', () => {
            panel.classList.toggle('collapsed');
        });

        // 状态
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        let targetHeadX = 0, targetHeadY = 0;
        let currentHeadX = 0, currentHeadY = 0;
        let targetHeadAngle = 0, currentHeadAngle = 0;
        let targetBodyAngle = 0, currentBodyAngle = 0;
        let targetEyeX = 0, targetEyeY = 0;
        let currentEyeX = 0, currentEyeY = 0;

        let images = {};
        let loadedCount = 0;
        let allLoaded = false;

        function loadImages() {
            layerConfigs.forEach(cfg => {
                const img = new Image();
                img.src = cfg.filename;
                img.onload = () => { images[cfg.name] = img; loadedCount++; if (loadedCount === layerConfigs.length) allLoaded = true; };
                img.onerror = () => { console.error('Failed to load:', cfg.filename); loadedCount++; };
            });
        }

        document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

        function lerp(a, b, t) { return a + (b - a) * t; }

        function getMouseOffset() {
            const rect = canvas.getBoundingClientRect();
            const scaleX = CANVAS_SIZE / rect.width;
            const scaleY = CANVAS_SIZE / rect.height;
            const cx = (mouseX - rect.left) * scaleX;
            const cy = (mouseY - rect.top) * scaleY;
            const dx = cx - FACE_CENTER_X;
            const dy = cy - FACE_CENTER_Y;
            const maxDist = CANVAS_SIZE * 0.6;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const factor = Math.min(dist, maxDist) / maxDist;
            const angle = Math.atan2(dy, dx);
            return { x: Math.cos(angle)*factor, y: Math.sin(angle)*factor };
        }

        function updateTargets() {
            const off = getMouseOffset();
            targetHeadX = off.x * params.maxHeadMove;
            targetHeadY = off.y * params.maxHeadMove;
            targetHeadAngle = off.x * params.maxHeadAngle * D2R;
            targetBodyAngle = off.x * params.maxBodyAngle * D2R;
            targetEyeX = off.x * params.maxEyeMove;
            targetEyeY = off.y * params.maxEyeMove;
        }

        function updateCurrent() {
            currentHeadX = lerp(currentHeadX, targetHeadX, params.lerpHead);
            currentHeadY = lerp(currentHeadY, targetHeadY, params.lerpHead);
            currentHeadAngle = lerp(currentHeadAngle, targetHeadAngle, params.lerpHead);
            currentBodyAngle = lerp(currentBodyAngle, targetBodyAngle, params.lerpHead);
            currentEyeX = lerp(currentEyeX, targetEyeX, params.lerpEye);
            currentEyeY = lerp(currentEyeY, targetEyeY, params.lerpEye);
        }

        // 计算某点围绕身体旋转中心旋转后的位移（不是新坐标，是位移量）
        function getBodyRotDelta(px, py) {
            const dx = px - params.bodyPivotX;
            const dy = py - params.bodyPivotY;
            const c = Math.cos(currentBodyAngle);
            const s = Math.sin(currentBodyAngle);
            return {
                x: (dx * c - dy * s) - dx,
                y: (dx * s + dy * c) - dy
            };
        }

        // 将局部向量旋转到世界坐标系
        function rotateVector(vx, vy, angle) {
            const c = Math.cos(angle);
            const s = Math.sin(angle);
            return { x: vx * c - vy * s, y: vx * s + vy * c };
        }

        function getLayerTransform(group) {
            switch (group) {
                case 'prop':
                    return { pivotX: 0, pivotY: 0, angle: 0, offX: 0, offY: 0 };

                case 'body': {
                    return {
                        pivotX: params.bodyPivotX,
                        pivotY: params.bodyPivotY,
                        angle: currentBodyAngle,
                        offX: 0, offY: 0
                    };
                }

                case 'neck': {
                    const inf = params.neckHeadInfluence;
                    // 颈部旋转 = 身体旋转 + 头部独立旋转 * 影响系数
                    const neckAngle = currentBodyAngle + currentHeadAngle * inf;
                    // 头部旋转中心被身体带到的新位置
                    const pivotDelta = getBodyRotDelta(params.headPivotX, params.headPivotY);
                    // 颈部平移 = 身体位移 + 头部独立平移 * 影响系数
                    return {
                        pivotX: params.headPivotX + pivotDelta.x,
                        pivotY: params.headPivotY + pivotDelta.y,
                        angle: neckAngle,
                        offX: pivotDelta.x + currentHeadX * inf,
                        offY: pivotDelta.y + currentHeadY * inf
                    };
                }

                case 'head': {
                    // 头部总角度 = 身体角度 + 头部独立角度
                    const totalAngle = currentBodyAngle + currentHeadAngle;
                    // 头部旋转中心先被身体旋转带到新位置
                    const pivotDelta = getBodyRotDelta(params.headPivotX, params.headPivotY);
                    // 头部的世界坐标平移 = 身体带来的位移 + 头部独立平移
                    return {
                        pivotX: params.headPivotX + pivotDelta.x,
                        pivotY: params.headPivotY + pivotDelta.y,
                        angle: totalAngle,
                        offX: pivotDelta.x + currentHeadX,
                        offY: pivotDelta.y + currentHeadY
                    };
                }

                case 'eye': {
                    const totalAngle = currentBodyAngle + currentHeadAngle;
                    const pivotDelta = getBodyRotDelta(params.headPivotX, params.headPivotY);
                    // 眼睛偏移在头部局部坐标系中，需旋转到世界坐标
                    const eyeWorld = rotateVector(currentEyeX, currentEyeY, totalAngle);
                    return {
                        pivotX: params.headPivotX + pivotDelta.x,
                        pivotY: params.headPivotY + pivotDelta.y,
                        angle: totalAngle,
                        offX: pivotDelta.x + currentHeadX + eyeWorld.x,
                        offY: pivotDelta.y + currentHeadY + eyeWorld.y
                    };
                }

                case 'pupil': {
                    const totalAngle = currentBodyAngle + currentHeadAngle;
                    const pivotDelta = getBodyRotDelta(params.headPivotX, params.headPivotY);

                    let extraX = (currentEyeX / (params.maxEyeMove || 1)) * params.maxPupilMove;
                    let extraY = (currentEyeY / (params.maxEyeMove || 1)) * params.maxPupilMove;
                    extraX = Math.max(-params.pupilLimitX, Math.min(params.pupilLimitX, extraX));
                    extraY = Math.max(-params.pupilLimitY, Math.min(params.pupilLimitY, extraY));

                    const pupilLocalX = currentEyeX + extraX;
                    const pupilLocalY = currentEyeY + extraY;
                    const pupilWorld = rotateVector(pupilLocalX, pupilLocalY, totalAngle);

                    return {
                        pivotX: params.headPivotX + pivotDelta.x,
                        pivotY: params.headPivotY + pivotDelta.y,
                        angle: totalAngle,
                        offX: pivotDelta.x + currentHeadX + pupilWorld.x,
                        offY: pivotDelta.y + currentHeadY + pupilWorld.y
                    };
                }

                default:
                    return { pivotX: 0, pivotY: 0, angle: 0, offX: 0, offY: 0 };
            }
        }

        function draw() {
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            if (!allLoaded) return;

            for (const cfg of layerConfigs) {
                const img = images[cfg.name];
                const pos = layerPositions[cfg.name];
                const t = getLayerTransform(cfg.group);
                if (!img || !pos) continue;

                if (t.angle === 0) {
                    ctx.drawImage(img, pos.x + t.offX, pos.y + t.offY, pos.w, pos.h);
                } else {
                    ctx.save();
                    ctx.translate(t.pivotX + t.offX, t.pivotY + t.offY);
                    ctx.rotate(t.angle);
                    ctx.drawImage(img, pos.x - t.pivotX, pos.y - t.pivotY, pos.w, pos.h);
                    ctx.restore();
                }
            }

            if (params.debug) {
                const eyeT = getLayerTransform('eye');
                const pupilT = getLayerTransform('pupil');
                const ew = layerPositions.eyewhite;
                const ir = layerPositions.irides;

                // 身体旋转中心
                ctx.fillStyle = '#0ff';
                ctx.beginPath();
                ctx.arc(params.bodyPivotX, params.bodyPivotY, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = '11px sans-serif';
                ctx.fillText('bodyPivot', params.bodyPivotX + 8, params.bodyPivotY + 4);

                // 头部旋转中心（已被身体旋转带到新位置）
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(eyeT.pivotX, eyeT.pivotY, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.fillText('headPivot', eyeT.pivotX + 8, eyeT.pivotY + 4);

                // eyewhite 边界
                ctx.save();
                ctx.translate(eyeT.pivotX + eyeT.offX, eyeT.pivotY + eyeT.offY);
                ctx.rotate(eyeT.angle);
                ctx.strokeStyle = '#0f0';
                ctx.lineWidth = 2;
                ctx.strokeRect(ew.x - eyeT.pivotX, ew.y - eyeT.pivotY, ew.w, ew.h);
                ctx.restore();

                // irides 边界
                ctx.save();
                ctx.translate(pupilT.pivotX + pupilT.offX, pupilT.pivotY + pupilT.offY);
                ctx.rotate(pupilT.angle);
                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 2;
                ctx.strokeRect(ir.x - pupilT.pivotX, ir.y - pupilT.pivotY, ir.w, ir.h);
                ctx.restore();
            }
        }

        function animate() {
            updateTargets();
            updateCurrent();
            draw();
            requestAnimationFrame(animate);
        }

        function resizeCanvas() {
            const size = Math.min(window.innerWidth, window.innerHeight);
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        loadImages();
        animate();
    </script>
</body>
</html>
